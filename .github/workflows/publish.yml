name: Publish

# Publish to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored.
#
# One-time setup required on PyPI:
#   Project -> Settings -> Publishing -> add a Trusted Publisher with
#     owner:        ograsdijk
#     repository:   precilaser
#     workflow:     publish.yml
#     environment:  pypi

on:
  release:
    types: [published]

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing (OIDC)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
